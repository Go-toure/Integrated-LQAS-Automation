name: LQAS Complete Pipeline

on:
  # Trigger on push to main/master branch
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'config/**'
      - '.github/workflows/**'
  
  # Scheduled runs: every 2 hours
  schedule:
    - cron: '0 */2 * * *'
  
  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      force_full:
        description: 'Force full reprocessing of all files'
        required: false
        default: 'false'
        type: boolean
      specific_forms:
        description: 'Specific form IDs to process (comma-separated, leave empty for all)'
        required: false
        default: ''
        type: string

# Environment variables from GitHub Secrets
env:
  ONA_API_TOKEN: ${{ secrets.ONA_API_TOKEN }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # ============================================================
  # JOB 1: Fetch data from ONA API
  # ============================================================
  fetch-data:
    name: 📡 Fetch Data from ONA
    runs-on: ubuntu-latest
    outputs:
      files_fetched: ${{ steps.count_files.outputs.count }}
      fetch_status: ${{ steps.fetch.outcome }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Python dependencies
        run: |
          pip install pandas requests pyyaml rpy2 python-dotenv
      
      - name: Install R (for qs package)
        run: |
          sudo apt-get update
          sudo apt-get install -y r-base
          Rscript -e "install.packages('qs', repos='https://cloud.r-project.org/', quiet=TRUE)"
      
      - name: Create directories
        run: |
          mkdir -p data/input
          mkdir -p data/output
          mkdir -p data/archive
          mkdir -p data/metadata
          mkdir -p logs
          mkdir -p reports
      
      - name: Fetch data from ONA
        id: fetch
        run: |
          python src/python/fetch_ona_data.py \
            --config config/config.yml \
            ${{ github.event.inputs.force_full == 'true' && '--force-full' || '' }} \
            ${{ github.event.inputs.specific_forms != '' && format('--form-ids {0}', github.event.inputs.specific_forms) || '' }}
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
      
      - name: Count fetched files
        id: count_files
        run: |
          count=$(ls -1 data/input/*.rds 2>/dev/null | wc -l)
          echo "count=$count" >> $GITHUB_OUTPUT
          echo "📊 Total files fetched: $count"
          
          if [ $count -gt 0 ]; then
            echo "✅ Successfully fetched $count files"
          else
            echo "⚠️ No files were fetched"
          fi
      
      - name: Upload fetched data artifact
        uses: actions/upload-artifact@v4
        with:
          name: fetched-data
          path: data/input/
          retention-days: 7
      
      - name: Upload fetch logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fetch-logs
          path: logs/
          retention-days: 30

  # ============================================================
  # JOB 2: Process data with R (parallel chunks)
  # ============================================================
  process-data:
    name: 🔄 Process Data with R
    needs: fetch-data
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chunk: [1, 2, 3, 4]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download fetched data
        uses: actions/download-artifact@v4
        with:
          name: fetched-data
          path: data/input/
      
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'
          use-public-rspm: true
      
      - name: Install R packages
        run: |
          install.packages(c(
            'tidyverse',
            'qs',
            'logger',
            'fs',
            'argparse',
            'janitor',
            'readxl',
            'writexl',
            'stringr',
            'lubridate',
            'dplyr',
            'tidyr',
            'purrr'
          ), repos = 'https://cloud.r-project.org/', quiet = TRUE)
        shell: Rscript {0}
      
      - name: Create output directory
        run: mkdir -p data/output
      
      - name: Process files (Chunk ${{ matrix.chunk }}/4)
        id: process_chunk
        run: |
          Rscript src/r/process_lqas.R \
            --input-dir data/input \
            --output-dir data/output \
            --chunk ${{ matrix.chunk }} \
            --total-chunks 4 \
            ${{ github.event.inputs.force_full == 'true' && '--force-full' || '' }}
        continue-on-error: false
      
      - name: Upload processed data chunk
        uses: actions/upload-artifact@v4
        with:
          name: processed-data-chunk-${{ matrix.chunk }}
          path: data/output/
          retention-days: 7
      
      - name: Upload processing logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: processing-logs-chunk-${{ matrix.chunk }}
          path: logs/
          retention-days: 30

  # ============================================================
  # JOB 3: Combine all processed data and validate
  # ============================================================
  combine-validate:
    name: 🔗 Combine and Validate Data
    needs: process-data
    runs-on: ubuntu-latest
    outputs:
      total_records: ${{ steps.combine.outputs.records }}
      validation_status: ${{ steps.validate.outputs.status }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download all processed data chunks
        uses: actions/download-artifact@v4
        with:
          pattern: processed-data-chunk-*
          path: data/output/
          merge-multiple: true
      
      - name: Combine and validate data
        id: combine
        run: |
          Rscript -e "
            library(dplyr)
            library(readr)
            library(logger)
            
            log_info('Starting data combination...')
            
            # Find all CSV files
            files <- list.files('data/output/', pattern = '\\.csv$', full.names = TRUE)
            log_info('Found {length(files)} CSV files')
            
            if (length(files) == 0) {
              log_warn('No output files found to combine')
              quit(status = 0)
            }
            
            # Combine all files
            combined <- purrr::map_dfr(files, read_csv, show_col_types = FALSE)
            log_info('✅ Combined {nrow(combined)} rows, {ncol(combined)} columns')
            
            # Save combined data
            write_csv(combined, 'data/final_lqas_data.csv')
            
            # Output to GitHub
            cat(paste('records=', nrow(combined), sep=''), file = Sys.getenv('GITHUB_OUTPUT'), append = TRUE)
            
            # Basic validation
            required_cols <- c('country', 'province', 'district', 'total_sampled', 'total_vaccinated')
            missing_cols <- setdiff(required_cols, names(combined))
            
            if (length(missing_cols) > 0) {
              log_warn('⚠️ Missing columns: {paste(missing_cols, collapse = \", \")}')
              cat('status=warning', file = Sys.getenv('GITHUB_OUTPUT'), append = TRUE)
            } else {
              log_info('✅ All required columns present')
              
              # Calculate summary stats
              total_samples <- sum(combined$total_sampled, na.rm = TRUE)
              total_vaccinated <- sum(combined$total_vaccinated, na.rm = TRUE)
              coverage <- round(total_vaccinated / total_samples * 100, 1)
              
              log_info('📊 Summary Statistics:')
              log_info('   Total sampled: {format(total_samples, big.mark = \",\")}')
              log_info('   Total vaccinated: {format(total_vaccinated, big.mark = \",\")}')
              log_info('   Overall coverage: {coverage}%')
              
              cat('status=success', file = Sys.getenv('GITHUB_OUTPUT'), append = TRUE)
            }
          "
        shell: bash
      
      - name: Upload combined data
        uses: actions/upload-artifact@v4
        with:
          name: final-data
          path: data/final_lqas_data.csv
          retention-days: 30

  # ============================================================
  # JOB 4: Generate HTML Dashboard
  # ============================================================
  dashboard:
    name: 📊 Generate Dashboard
    needs: combine-validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download final data
        uses: actions/download-artifact@v4
        with:
          name: final-data
          path: data/
      
      - name: Create dashboard
        run: |
          mkdir -p reports
          Rscript -e "
            library(ggplot2)
            library(dplyr)
            library(tidyr)
            
            data <- tryCatch({
              read.csv('data/final_lqas_data.csv')
            }, error = function(e) {
              message('No data available')
              return(NULL)
            })
            
            if (!is.null(data) && nrow(data) > 0) {
              # Create summary by country
              summary_by_country <- data %>%
                group_by(country) %>%
                summarise(
                  total_sampled = sum(total_sampled, na.rm = TRUE),
                  total_vaccinated = sum(total_vaccinated, na.rm = TRUE),
                  coverage = round(total_vaccinated / total_sampled * 100, 1),
                  districts = n_distinct(district),
                  .groups = 'drop'
                ) %>%
                arrange(desc(coverage))
              
              # Create summary by response
              summary_by_response <- data %>%
                group_by(response, vaccine.type) %>%
                summarise(
                  total_sampled = sum(total_sampled, na.rm = TRUE),
                  total_vaccinated = sum(total_vaccinated, na.rm = TRUE),
                  coverage = round(total_vaccinated / total_sampled * 100, 1),
                  .groups = 'drop'
                ) %>%
                arrange(desc(coverage))
              
              # Calculate overall metrics
              total_records <- nrow(data)
              total_countries <- n_distinct(data$country)
              total_districts <- n_distinct(data$district)
              total_sampled <- sum(data$total_sampled, na.rm = TRUE)
              total_vaccinated <- sum(data$total_vaccinated, na.rm = TRUE)
              overall_coverage <- round(total_vaccinated / total_sampled * 100, 1)
              
              # Generate HTML dashboard
              html <- sprintf('
              <!DOCTYPE html>
              <html lang=\"en\">
              <head>
                  <meta charset=\"UTF-8\">
                  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
                  <title>LQAS Data Dashboard</title>
                  <style>
                      * {
                          margin: 0;
                          padding: 0;
                          box-sizing: border-box;
                      }
                      
                      body {
                          font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Arial, sans-serif;
                          background: linear-gradient(135deg, #667eea 0%%, #764ba2 100%%);
                          min-height: 100vh;
                          padding: 20px;
                      }
                      
                      .container {
                          max-width: 1400px;
                          margin: 0 auto;
                      }
                      
                      .header {
                          background: white;
                          border-radius: 20px;
                          padding: 30px;
                          margin-bottom: 30px;
                          box-shadow: 0 10px 40px rgba(0,0,0,0.1);
                      }
                      
                      .header h1 {
                          color: #1e3c72;
                          font-size: 32px;
                          margin-bottom: 10px;
                      }
                      
                      .header .subtitle {
                          color: #666;
                          font-size: 14px;
                      }
                      
                      .stats-grid {
                          display: grid;
                          grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                          gap: 20px;
                          margin-bottom: 30px;
                      }
                      
                      .stat-card {
                          background: white;
                          border-radius: 15px;
                          padding: 20px;
                          text-align: center;
                          box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                          transition: transform 0.3s;
                      }
                      
                      .stat-card:hover {
                          transform: translateY(-5px);
                      }
                      
                      .stat-number {
                          font-size: 36px;
                          font-weight: bold;
                          color: #2a5298;
                          margin-bottom: 10px;
                      }
                      
                      .stat-label {
                          color: #666;
                          font-size: 14px;
                      }
                      
                      .card {
                          background: white;
                          border-radius: 15px;
                          padding: 25px;
                          margin-bottom: 30px;
                          box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                      }
                      
                      .card h2 {
                          color: #1e3c72;
                          margin-bottom: 20px;
                          font-size: 20px;
                          border-left: 4px solid #2a5298;
                          padding-left: 15px;
                      }
                      
                      table {
                          width: 100%%;
                          border-collapse: collapse;
                      }
                      
                      th, td {
                          padding: 12px;
                          text-align: left;
                          border-bottom: 1px solid #e0e0e0;
                      }
                      
                      th {
                          background-color: #f8f9fa;
                          font-weight: 600;
                          color: #495057;
                      }
                      
                      tr:hover {
                          background-color: #f8f9fa;
                      }
                      
                      .badge-success {
                          background: #d4edda;
                          color: #155724;
                          padding: 4px 8px;
                          border-radius: 20px;
                          font-size: 12px;
                          font-weight: 500;
                      }
                      
                      .badge-warning {
                          background: #fff3cd;
                          color: #856404;
                          padding: 4px 8px;
                          border-radius: 20px;
                          font-size: 12px;
                          font-weight: 500;
                      }
                      
                      .footer {
                          text-align: center;
                          color: white;
                          margin-top: 30px;
                          font-size: 12px;
                      }
                      
                      @media (max-width: 768px) {
                          .stats-grid {
                              grid-template-columns: 1fr;
                          }
                          table {
                              font-size: 12px;
                          }
                      }
                  </style>
              </head>
              <body>
                  <div class=\"container\">
                      <div class=\"header\">
                          <h1>📊 LQAS Data Dashboard</h1>
                          <div class=\"subtitle\">
                              Automated Pipeline Report | Generated: %s | GitHub Run: #%s
                          </div>
                      </div>
                      
                      <div class=\"stats-grid\">
                          <div class=\"stat-card\">
                              <div class=\"stat-number\">%s</div>
                              <div class=\"stat-label\">Total Records</div>
                          </div>
                          <div class=\"stat-card\">
                              <div class=\"stat-number\">%d</div>
                              <div class=\"stat-label\">Countries</div>
                          </div>
                          <div class=\"stat-card\">
                              <div class=\"stat-number\">%d</div>
                              <div class=\"stat-label\">Districts</div>
                          </div>
                          <div class=\"stat-card\">
                              <div class=\"stat-number\">%s</div>
                              <div class=\"stat-label\">Total Sampled</div>
                          </div>
                          <div class=\"stat-card\">
                              <div class=\"stat-number\">%s</div>
                              <div class=\"stat-label\">Total Vaccinated</div>
                          </div>
                          <div class=\"stat-card\">
                              <div class=\"stat-number\">%s%%</div>
                              <div class=\"stat-label\">Overall Coverage</div>
                          </div>
                      </div>
                      
                      <div class=\"card\">
                          <h2>🌍 Coverage by Country</h2>
                           <table>
                              <thead>
                                  <tr><th>Country</th><th>Districts</th><th>Sampled</th><th>Vaccinated</th><th>Coverage</th></tr>
                              </thead>
                              <tbody>
                                  %s
                              </tbody>
                           </table>
                      </div>
                      
                      <div class=\"card\">
                          <h2>💉 Coverage by Response/Vaccine</h2>
                           <table>
                              <thead>
                                  <tr><th>Response</th><th>Vaccine Type</th><th>Sampled</th><th>Vaccinated</th><th>Coverage</th></tr>
                              </thead>
                              <tbody>
                                  %s
                              </tbody>
                           </table>
                      </div>
                      
                      <div class=\"footer\">
                          <p>🤖 Fully Automated LQAS Pipeline | Next run: in 2 hours | Data updated: %s</p>
                          <p style=\"margin-top: 10px; font-size: 11px;\">Dashboard generated by GitHub Actions | <a href=\"https://github.com/%s/%s\" style=\"color: white;\">View Repository</a></p>
                      </div>
                  </div>
              </body>
              </html>',
                Sys.Date(),
                Sys.getenv('GITHUB_RUN_ID', 'local'),
                format(total_records, big.mark = ','),
                total_countries,
                total_districts,
                format(total_sampled, big.mark = ','),
                format(total_vaccinated, big.mark = ','),
                overall_coverage,
                paste(
                  apply(summary_by_country, 1, function(row) {
                    coverage <- as.numeric(row['coverage'])
                    badge_class <- ifelse(coverage >= 90, 'badge-success', 'badge-warning')
                    sprintf('
                      <tr>
                          <td><strong>%s</strong></td>
                          <td>%s</td>
                          <td>%s</td>
                          <td>%s</td>
                          <td><span class=\"%s\">%s%%</span></td>
                      </tr>',
                      row['country'],
                      format(as.numeric(row['districts']), big.mark = ','),
                      format(as.numeric(row['total_sampled']), big.mark = ','),
                      format(as.numeric(row['total_vaccinated']), big.mark = ','),
                      badge_class,
                      row['coverage']
                    )
                  }),
                  collapse = '\n'
                ),
                paste(
                  apply(head(summary_by_response, 15), 1, function(row) {
                    coverage <- as.numeric(row['coverage'])
                    badge_class <- ifelse(coverage >= 90, 'badge-success', 'badge-warning')
                    sprintf('
                      <tr>
                          <td>%s</td>
                          <td>%s</td>
                          <td>%s</td>
                          <td>%s</td>
                          <td><span class=\"%s\">%s%%</span></td>
                      </tr>',
                      row['response'],
                      row['vaccine.type'],
                      format(as.numeric(row['total_sampled']), big.mark = ','),
                      format(as.numeric(row['total_vaccinated']), big.mark = ','),
                      badge_class,
                      row['coverage']
                    )
                  }),
                  collapse = '\n'
                ),
                format(Sys.time(), '%Y-%m-%d %H:%M:%S'),
                Sys.getenv('GITHUB_REPOSITORY_OWNER', 'your-username'),
                Sys.getenv('GITHUB_REPOSITORY_NAME', 'lqas-automation')
              )
              
              writeLines(html, 'reports/dashboard.html')
              message('✅ Dashboard generated successfully')
            } else {
              writeLines('
              <!DOCTYPE html>
              <html>
              <head><title>LQAS Dashboard</title></head>
              <body style=\"font-family: Arial; text-align: center; padding: 50px;\">
                  <h1>📊 LQAS Dashboard</h1>
                  <p>No data available yet. Please check the pipeline logs.</p>
                  <p>Pipeline Status: <a href=\"https://github.com/%s/%s/actions\">View GitHub Actions</a></p>
              </body>
              </html>', 'reports/dashboard.html')
              message('⚠️ No data to display')
            }
          "
        shell: Rscript {0}
      
      - name: Upload dashboard
        uses: actions/upload-artifact@v4
        with:
          name: dashboard
          path: reports/dashboard.html
          retention-days: 30
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
          publish_branch: gh-pages
          destination_dir: latest
          keep_files: false
      
      - name: Create versioned dashboard
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
          publish_branch: gh-pages
          destination_dir: ${{ github.run_number }}
          keep_files: true

  # ============================================================
  # JOB 5: Send Notifications (Optional - if emails configured)
  # ============================================================
  notify:
    name: 📧 Send Notifications
    needs: [fetch-data, process-data, combine-validate, dashboard]
    runs-on: ubuntu-latest
    if: always() && secrets.EMAIL_USER != '' && secrets.EMAIL_PASSWORD != ''
    
    steps:
      - name: Check status
        id: status
        run: |
          if [[ "${{ needs.fetch-data.result }}" == "success" && \
                "${{ needs.process-data.result }}" == "success" && \
                "${{ needs.combine-validate.result }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "message=SUCCESS" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "message=FAILED" >> $GITHUB_OUTPUT
          fi
      
      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: |
            ${{ steps.status.outputs.emoji }} LQAS Pipeline ${{ steps.status.outputs.message }} - Run #${{ github.run_number }}
          to: ${{ secrets.NOTIFICATION_EMAILS }}
          from: LQAS Automation <${{ secrets.EMAIL_USER }}>
          body: |
            # LQAS Pipeline Execution Report
            
            **Status:** ${{ steps.status.outputs.emoji }} ${{ steps.status.outputs.message }}
            **Run ID:** #${{ github.run_number }}
            **Trigger:** ${{ github.event_name }}
            **Time:** ${{ github.event.head_commit.timestamp || github.event.schedule || 'manual' }}
            
            ## 📊 Processing Summary
            
            | Component | Status | Details |
            |-----------|--------|---------|
            | Data Fetch | ${{ needs.fetch-data.result }} | ${{ needs.fetch-data.outputs.files_fetched || 0 }} files |
            | R Processing | ${{ needs.process-data.result }} | 4 parallel chunks |
            | Validation | ${{ needs.combine-validate.result }} | ${{ needs.combine-validate.outputs.total_records || 0 }} records |
            | Dashboard | ${{ needs.dashboard.result }} | Deployed to GitHub Pages |
            
            ${{ steps.status.outputs.status == 'success' && '## 📈 Dashboard\n\nView the live dashboard at:\nhttps://' + github.repository_owner + '.github.io/' + github.event.repository.name + '/latest/dashboard.html' || '' }}
            
            ${{ steps.status.outputs.status == 'failed' && '## 🔧 Action Required\n\nPlease check the GitHub Actions logs for details:\n' + github.server_url + '/' + github.repository + '/actions/runs/' + github.run_id || '' }}
            
            ---
            *This is an automated message from the LQAS Pipeline | Next scheduled run: in 2 hours*